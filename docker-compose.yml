services:
  mysql:
    image: mysql:8.4
    container_name: summit-ridge-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: summitridge_it
      MYSQL_USER: summitridge
      MYSQL_PASSWORD: summitridge_pw
      MYSQL_ROOT_PASSWORD: summit_root_pw
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  mysql_data:
