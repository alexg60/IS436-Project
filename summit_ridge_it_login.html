<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summit Ridge IT Login</title>
  <link rel="stylesheet" href="./summit_ridge_it_ticketing_homepage.css" />
</head>
<body data-page="login">
  <div class="login-page-shell">
    <section class="login-copy">
      <img src="./images/IMG_2005.JPG" alt="Summit Ridge logo artwork" class="login-brand-art" />
      <div class="login-copy-inner">
        <span class="eyebrow">Secure Access</span>
        <h1>Sign in to the Summit Ridge support portal.</h1>
        <p>
          Access ticket tracking, device assignments, and internal dashboards from a single company login.
        </p>
      </div>
    </section>

    <section class="login-card">
      <span class="eyebrow">Employee Login</span>
      <h2>Welcome back</h2>
      <p class="login-meta">Use your company credentials to continue.</p>

      <form class="login-form">
        <div class="field-group">
          <label for="email">Work Email</label>
          <input id="email" name="email" type="email" placeholder="name@summitridge.com" required />
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter your password" />
        </div>

        <div class="login-actions">
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
          <a href="./summit_ridge_it_ticketing_homepage.html" class="btn btn-secondary btn-full">Back to Homepage</a>
        </div>
      </form>
    </section>
  </div>
</body>
<script src="./app.js"></script>
</html>
